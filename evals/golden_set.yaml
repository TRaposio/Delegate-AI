# Golden set for the WCA RAG eval harness.
#
# Format:
#   id:            stable identifier (q01, q02, ...). Sort key.
#                  String, not int, so q01a-style insertions don't force
#                  renumbering downstream.
#   question:      the delegate's question, verbatim.
#   expected_mode: ANSWER | PARTIAL | REFUSE
#   expected_ids:  list of regulation ids that *should* be cited.
#                  Granularity: claim-level (Option A). Sub-rule ids
#                  like A6c, 11e++, 3l1a are valid here. For REFUSE,
#                  use an empty list.
#   notes:         human-readable rationale for expected mode/ids.
#                  Future-you reads these in 3 months.
#
# Loader sorts by id, but a sorted file diffs cleanly. Keep it sorted.

- id: q01
  question: "Can a competitor stop the timer while still touching the puzzle?"
  expected_mode: ANSWER
  expected_ids:
    - A6c
  notes: >
    Smoke-test fixture. A6c directly addresses stopping the timer
    without first releasing the puzzle (+2 penalty). Citation should
    be at sub-rule granularity (A6c), not at chunk-parent granularity
    (A6). Verifies Option A's claim-level citation contract.

- id: q02
  question: "What is the WCA's policy on logo usage? Can I use the WCA logo on the mugs I want to sell?"
  expected_mode: PARTIAL
  expected_ids:
    - 3l
    - 3l1
    - 3j
  notes: >
    Two-part question: puzzle-logo policy is in the corpus, merchandise
    use is not. Model must answer the covered half and explicitly state
    the uncovered half. The expected_ids list is intentionally
    representative-not-exhaustive — sub-rules like 3l+, 3l1a, 3l1b,
    3l2, 3l++ are all reasonable additional citations and the model
    legitimately produced more than three. Citation accuracy will read
    high for any reasonable answer here; the load-bearing check is
    expected_mode = PARTIAL, not the exact citation set.

- id: q03
  question: "I have a 3x3 fewest moves solution written down. It's half on one sheet of paper and half on another one. If you put the paper close together, it's an unambiguous sequence of moves and it's correct. Can I accept it?"
  expected_mode: ANSWER
  expected_ids:
    - E2c
  notes: >
    Edge case for FMC submission rules. E2c specifies a single piece
    of paper. The strict reading (one physical sheet) is the
    controlling text and the model takes it. There's a defensible
    argument this question is genuinely ambiguous and should REFUSE
    (procedural judgment call escalates to human delegate, per
    CONCEPTS.md "Refusal as a first-class output"). For v0 we tag it
    ANSWER and accept the strict reading; a separate explicitly-
    ambiguous fixture should be added later to measure ambiguity-
    handling distinct from rule-lookup.


