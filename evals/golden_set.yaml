# # ----------------------------------------------------------------------
# # HARD (q09-q18): discretion, multi-rule, careful reading, boundary.
# # Expectation: imperfect performance is informative. The point is to
# # measure WHICH failure modes dominate (sycophancy / wrong branch /
# # missing nested rule / refusal-when-rule-exists).
# # ----------------------------------------------------------------------

# - id: q09
#   question: "A competitor's puzzle was scrambled with the wrong scramble (scrambler grabbed the wrong card). The competitor got a 12.50 -- nothing special, well off their PR average of 9.something. We noticed before the round ended. Do I grant an extra?"
#   expected_mode: ANSWER
#   expected_ids:
#     - 11i
#     - 11i2
#     - 11i2+
#   notes: >
#     Textbook misscramble discretion case. 11i2 makes the result
#     keep-able by default; the exception clause is "significantly
#     fairer outcome" which here is unlikely (12.50 is well above the
#     competitor's average, no PR/record on the line, no podium impact).
#     A reasonable delegate keeps the result, possibly with a
#     provisional extra per 11i2+. The model needs to: (a) find 11i2,
#     (b) NOT default to "extra attempt" from 11i1 or 11j3 which cover
#     different misscramble scenarios, (c) apply the discretion correctly
#     given the fact pattern. Confabulation risk: a model that
#     pattern-matches on "wrong scramble" may cite 11i1 (the
#     mandatory-extra branch) without reading the 11i1a-f criteria.
#     Mode is ANSWER because 11i2 governs, but the *content* of the
#     answer is where the model is most likely to err.

- id: q10
  question: "The prescribed Pyraminx scramble had three tips scrambled, but the scrambler only scrambled two of them -- the third tip was left in its solved orientation. Competitor got a 5.80, well above their average. Do I keep the result or grant an extra?"
  expected_mode: ANSWER
  expected_ids:
    - 11i
    - 11i2
  notes: >
    Misscramble: the puzzle state delivered to the competitor diverges
    from the prescribed scramble (two tips scrambled instead of three).
    The state likely still meets 4b3f's "at least 6 moves to solve"
    threshold (Pyraminx body scramble plus two tips will), so this is
    not a "state invalidity" question -- it's straight 11i territory.
    Discretion case under 11i2: a missing tip is a small reduction
    in difficulty (tips are independent and trivial to fix), not
    significantly fairer. With the result well above the competitor's
    average and no record at stake, keeping the result is the
    reasonable call -- possibly with a provisional extra per 11i2+.
    Distinct from q09 in fact pattern (q09 = wrong scramble card
    grabbed; q10 = correct scramble incompletely applied) but both
    route through 11i2's discretion clause. Model failure modes:
    (a) jumps to 11i1 (mandatory-extra branch) without weighing the
    discretion criteria, (b) over-grants the extra out of sympathy
    for procedural correctness when the substantive impact on
    difficulty is negligible, (c) incorrectly invokes 4b3f
    (state-validity) when the state is in fact valid.

- id: q11
  question: "A competitor in the middle of an OH attempt got distracted by a phone ringing nearby. They stopped, requested an extra. Should I grant it?"
  expected_mode: ANSWER
  expected_ids:
    - 11a
    - 11a2
    - 11b
    - 11e
  notes: >
    Discretion case. 11a2 lists noise/distraction-class incidents. 11b
    governs whether the incident was significant enough to warrant an
    extra. 11e is the parent rule on extras. The "correct" answer is
    not categorical -- it depends on the magnitude of the distraction,
    which the question deliberately under-specifies. A good answer
    acknowledges the discretion explicitly, cites the framework, and
    does NOT confidently rule one way. A model that confidently says
    "yes, grant" or "no, deny" is failing the discretion check even
    if the citation set is correct. PARTIAL would also be defensible
    here -- the rules cover the framework but not the specific
    judgment call.

- id: q12
  question: "Competitor finishes a 3x3 solve. The puzzle has two adjacent center caps detached and lying on the mat. The rest of the puzzle looks solved. Is this a successful solve?"
  expected_mode: ANSWER
  expected_ids:
    - 5b5
    - 5b5++
    - 5b5c
    - 5b5b
  notes: >
    Compositional / careful-reading test. 5b5b says one part with one
    colored face is solved. 5b5c says more than one part with one
    colored face is DNF. Center caps each have one colored face, so
    two of them -> DNF (5b5c). The 5b5++ example specifically lists
    "two 3x3x3 center caps" as a DNF example -- the model should find
    this. Failure mode: model finds 5b5b ("one cap = solved") and
    extrapolates wrongly. Tests whether the model reads carefully
    enough to apply the right sub-rule rather than the closest-
    sounding one. Citing only 5b5b without 5b5c/5b5++ would yield a
    wrong answer with "correct-looking" citations.

